<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency OS — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#0f0f18;--bg3:#13131e;--bg4:#1a1a28;
  --border:#1e1e2e;--border2:#252535;
  --text:#e8e8f0;--text2:#8888a8;--text3:#555570;
  --violet:#7c6fcd;--violet2:#6356b5;--vglow:rgba(124,111,205,0.15);
  --cyan:#4dd9d9;--orange:#f0875a;--green:#4caf7d;
  --red:#e05c5c;--yellow:#d4a843;
  --r:10px;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
.lw{width:100%;max-width:480px}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-box{width:38px;height:38px;background:var(--violet);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff}
.logo-name{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.login-sub{color:var(--text3);font-size:12px;margin-bottom:28px;font-family:var(--mono)}
.lfoot{text-align:center;color:var(--text3);font-size:11px;margin-top:20px;font-family:var(--mono)}

/* ── APP ── */
#app{display:none;height:100vh}
.shell{display:flex;height:100%}

/* sidebar */
.sidebar{width:224px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%}
.slogo{display:flex;align-items:center;gap:8px;padding:18px 16px;border-bottom:1px solid var(--border)}
.slogo-box{width:28px;height:28px;background:var(--violet);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.snav{flex:1;padding:10px 8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s;color:var(--text2);font-size:13px;margin-bottom:1px}
.ni:hover{background:var(--bg4);color:var(--text)}
.ni.active{background:var(--vglow);color:var(--text);border:1px solid rgba(124,111,205,.2)}
.ni.active .nic{color:var(--violet)}
.nic{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.suser{padding:12px;border-top:1px solid var(--border)}
.urow{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:var(--bg3);margin-bottom:6px}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;border:1px solid}
.uname{font-size:12px;font-weight:500;color:var(--text)}
.urole{font-family:var(--mono);font-size:9px;margin-top:1px}
.logout{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.logout:hover{background:var(--bg4);color:var(--text2)}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:600;flex:1}
.tb-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.notif{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:13px;flex-shrink:0}
.ndot{position:absolute;top:5px;right:5px;width:5px;height:5px;background:var(--red);border-radius:50%}
.content{flex:1;overflow-y:auto;padding:24px}

/* stat cards */
.sg{display:grid;gap:12px;margin-bottom:20px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px}
.sc-l{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sc-v{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.sc-v.d{color:var(--red)}.sc-v.s{color:var(--green)}.sc-v.w{color:var(--yellow)}
.sc-t{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px}

/* section */
.section{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.sh{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sh-t{font-size:13px;font-weight:600;flex:1}
.sbtn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;font-family:var(--sans)}
.sbtn:hover{background:var(--bg4);color:var(--text)}
.sbtn.p{background:var(--violet);border-color:var(--violet);color:#fff}
.sbtn.p:hover{background:var(--violet2)}

/* table */
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg4)}
td{padding:11px 16px;font-size:12px;color:var(--text2);white-space:nowrap}
.cm{color:var(--text);font-weight:500;font-size:13px}

/* badge */
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;border:1px solid;white-space:nowrap}
.bv{background:rgba(124,111,205,.15);color:#a99de8;border-color:rgba(124,111,205,.3)}
.bc{background:rgba(77,217,217,.08);color:var(--cyan);border-color:rgba(77,217,217,.25)}
.bo{background:rgba(240,135,90,.08);color:var(--orange);border-color:rgba(240,135,90,.25)}
.bg_{background:rgba(76,175,125,.08);color:var(--green);border-color:rgba(76,175,125,.25)}
.br{background:rgba(224,92,92,.08);color:var(--red);border-color:rgba(224,92,92,.25)}
.by{background:rgba(212,168,67,.08);color:var(--yellow);border-color:rgba(212,168,67,.25)}
.bgr{background:rgba(255,255,255,.04);color:var(--text3);border-color:var(--border2)}

/* tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text3);transition:all .12s;font-weight:500;user-select:none}
.tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}

/* progress */
.pbw{display:flex;align-items:center;gap:8px}
.pb{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;min-width:60px}
.pf{height:100%;border-radius:2px;background:var(--violet)}
.pf.hi{background:var(--green)}.pf.lo{background:var(--red)}
.pl{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:28px;text-align:right}

/* AI block */
.ai-block{background:var(--bg3);border:1px solid rgba(124,111,205,.25);border-radius:var(--r);padding:18px;margin-bottom:20px}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-ico{width:30px;height:30px;background:rgba(124,111,205,.15);border:1px solid rgba(124,111,205,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-ttl{font-size:13px;font-weight:600}
.ai-stl{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.mock-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;background:rgba(124,111,205,.1);color:var(--violet);border:1px solid rgba(124,111,205,.2);border-radius:20px;margin-left:auto}
.ai-row{display:flex;gap:8px}
.ai-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border .15s}
.ai-inp:focus{border-color:rgba(124,111,205,.5)}
.ai-inp::placeholder{color:var(--text3)}
.ai-mic{padding:9px 13px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;flex-shrink:0}
.ai-run{padding:9px 18px;background:var(--violet);border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ai-run:hover{background:var(--violet2)}
.ai-run:disabled{opacity:.5;cursor:not-allowed}
.ai-res{margin-top:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;display:none}
.ai-res pre{font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre-wrap;line-height:1.75}
.ai-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ai-act{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .12s}
.ai-act:hover{background:var(--bg4);color:var(--text2)}
.ai-act.notion{color:var(--violet);border-color:rgba(124,111,205,.3)}

/* project cards */
.pcards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px}
.pcard-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pcard-n{font-size:13px;font-weight:600;margin-bottom:3px}
.pcard-c{font-family:var(--mono);font-size:10px;color:var(--text3)}
.pcard-f{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.pcard-d{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* login form */
.lform{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.lfield{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border .15s;width:100%}
.lfield:focus{border-color:rgba(124,111,205,.5)}
.lfield::placeholder{color:var(--text3)}
.lbtn{width:100%;padding:12px;background:var(--violet);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.lbtn:hover{background:var(--violet2)}
.lbtn:disabled{opacity:.5;cursor:not-allowed}
.lerr{color:var(--red);font-family:var(--mono);font-size:11px;text-align:center;min-height:16px}
/* overdue */
.ov-row{background:rgba(224,92,92,.03)}
.od-dot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-right:6px;vertical-align:middle}

/* spinner */
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* responsive */
@media(max-width:768px){
  .sidebar{width:52px}
  .slogo span,.ni span:last-child,.uname,.urole,.logout{display:none}
  .ni{justify-content:center;padding:8px}
  .nic{width:auto}
  .sg4{grid-template-columns:repeat(2,1fr)}
  .pcards{grid-template-columns:1fr}
}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-t{font-size:14px;font-weight:600}
.modal-x{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px;font-family:var(--sans)}
.modal-x:hover{color:var(--text);background:var(--bg4)}
.modal-b{padding:20px}
.mlabel{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.mfield{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 13px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border .15s;margin-bottom:14px;display:block}
.mfield:focus{border-color:rgba(124,111,205,.5)}
.mfield::placeholder{color:var(--text3)}
select.mfield{cursor:pointer}
textarea.mfield{resize:vertical;line-height:1.5}
.mrow{display:flex;gap:10px}
.mrow .mhalf{flex:1}
.mrow .mhalf .mfield{margin-bottom:0}
.mfooter{display:flex;gap:8px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--border);margin-top:8px}
.merr{color:var(--red);font-family:var(--mono);font-size:11px;margin-bottom:12px;display:none;padding:8px 12px;background:rgba(224,92,92,.08);border:1px solid rgba(224,92,92,.2);border-radius:6px}
.mok{color:var(--green);font-family:var(--mono);font-size:11px;margin-bottom:12px;display:none;padding:8px 12px;background:rgba(76,175,125,.08);border:1px solid rgba(76,175,125,.2);border-radius:6px}

/* status select in tables */
.status-sel{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;font-size:10px;color:var(--text2);font-family:var(--mono);cursor:pointer;outline:none}
.status-sel:focus{border-color:rgba(124,111,205,.4)}

/* ── DATE PICKER (dark mode) ── */
input[type=date].mfield{color-scheme:dark;cursor:pointer}
input[type=date].mfield::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer;opacity:.7}
input[type=date].mfield::-webkit-calendar-picker-indicator:hover{opacity:1}

/* ── DONE TASK ROW ── */
tr.done-row{opacity:.38}
tr.done-row td{text-decoration:line-through;text-decoration-color:var(--text3)}
tr.done-row .cm{color:var(--text3)}
tr.done-row:hover{opacity:.5}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start}
.kancol{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.kancol-h{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.kancol-title{font-size:11px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;flex:1}
.kancol-cnt{font-family:var(--mono);font-size:10px;color:var(--text3);background:var(--bg4);padding:2px 7px;border-radius:10px}
.kancard{margin:8px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:default;transition:border-color .12s}
.kancard:hover{border-color:var(--border2)}
.kancard.done-card{opacity:.38}
.kancard-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:7px;line-height:1.4}
.kancard-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.kancard-assignee{font-family:var(--mono);font-size:10px;color:var(--text3)}
.kancard-dl{font-family:var(--mono);font-size:10px}
.view-toggle{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:2px}
.vt-btn{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;color:var(--text3);border:none;background:transparent;font-family:var(--sans);transition:all .12s}
.vt-btn.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}

/* ── USER MANAGEMENT ── */
.user-card{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:border-color .12s}
.user-card:hover{border-color:#3a3a55}
.user-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0;border:1px solid;overflow:hidden}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-info{flex:1}
.user-name{font-size:13px;font-weight:600;margin-bottom:2px}
.user-email{font-family:var(--mono);font-size:10px;color:var(--text3)}
.user-actions{display:flex;gap:6px;flex-shrink:0}

/* ── PROFILE EDIT IN SIDEBAR ── */
.edit-profile-btn{width:100%;padding:5px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text3);font-size:10px;cursor:pointer;transition:all .12s;font-family:var(--mono);margin-top:2px;text-align:center}
.edit-profile-btn:hover{background:var(--bg4);color:var(--text2);border-color:var(--border2)}

/* ── PRIVATE WORKSPACE ── */
.priv-empty{padding:32px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px}
.ptask-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.ptask-item:last-child{border-bottom:none}
.ptask-item:hover{background:var(--bg4)}
.ptask-check{width:16px;height:16px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;margin-top:1px;font-size:10px}
.ptask-check.done{background:var(--green);border-color:var(--green);color:#fff}
.ptask-body{flex:1}
.ptask-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px}
.ptask-title.done{text-decoration:line-through;color:var(--text3);opacity:.5}
.ptask-meta{display:flex;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text3)}
.ptask-del{color:var(--text3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;border:none;background:transparent;opacity:0;transition:opacity .12s}
.ptask-item:hover .ptask-del{opacity:1}
.ptask-del:hover{color:var(--red)}

/* ── LEADS FILTER ── */
.leads-filters{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.lf-group{display:flex;flex-direction:column;gap:4px}
.lf-label{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.lf-select,.lf-input{background:var(--bg);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;min-width:110px}
.lf-select:focus,.lf-input:focus{border-color:rgba(124,111,205,.4)}
.lf-reset{align-self:flex-end;padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.lf-reset:hover{background:var(--bg4);color:var(--text2)}
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login">
<div class="lw">
  <div class="logo-row">
    <div class="logo-box">A</div>
    <span class="logo-name">Agency OS</span>
  </div>
  <div class="login-sub">внутрішня система управління агентством · увійдіть щоб продовжити</div>
  <div class="lform">
    <input id="l-email" class="lfield" type="email" placeholder="Електронна пошта" autocomplete="email"/>
    <input id="l-pass"  class="lfield" type="password" placeholder="Пароль" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <div class="lerr" id="l-err"></div>
  <button class="lbtn" id="l-btn" onclick="doLogin()" style="margin-top:4px">Увійти →</button>
  <div class="lfoot" style="margin-top:20px">JWT авторизація · Argon2id · PostgreSQL · Vercel</div>

// ════════════════════════════════════════
// TOKEN STORE  (access token in memory only)

let accessToken = null
let currentUser = null  // { id, email, role, is_active }

// ════════════════════════════════════════
// API CLIENT  — adds Bearer, auto-refreshes
// ════════════════════════════════════════
async function api(path, opts = {}) {
  const hdrs = { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  if (accessToken) hdrs['Authorization'] = 'Bearer ' + accessToken

  let res = await fetch(path, { ...opts, headers: hdrs })

  if (res.status === 401 && accessToken) {
    const r = await fetch('/api/auth/refresh', { method: 'POST' })
    if (r.ok) {
      accessToken = (await r.json()).accessToken
      hdrs['Authorization'] = 'Bearer ' + accessToken
      res = await fetch(path, { ...opts, headers: hdrs })
    } else {
      doLogout()
      throw new Error('Session expired')
    }
  }
  return res
}

// ════════════════════════════════════════

const fmt = s => new Date(s).toLocaleDateString('uk-UA', {day:'numeric', month:'short'})

const isOverdue = t => t.deadline && new Date(t.deadline) < NOW && t.status !== 'DONE'

  TODO:'bgr', IN_PROGRESS:'bv', REVIEW:'by', DONE:'bg_',
  NEW:'bgr', CONTACTED:'bv', PROPOSAL:'by', WON:'bg_', LOST:'br',
}
const STATUS_UA = {
  ACTIVE:'Активний', COMPLETED:'Завершено', ON_HOLD:'На паузі', CANCELLED:'Скасовано',
  TODO:'До виконання', IN_PROGRESS:'В роботі', REVIEW:'На перевірці', DONE:'Готово',
  NEW:'Новий', CONTACTED:'Контакт', PROPOSAL:'Пропозиція', WON:'Виграно', LOST:'Програно',
  INCOME:'Дохід', EXPENSE:'Витрата',

const priDot = p => `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${PC[p]||'#555570'};margin-right:5px;vertical-align:middle"></span>${PRI_UA[p]||p}`

const loadingHTML = () => `<div style="padding:48px;text-align:center;color:var(--text3);font-family:var(--mono);font-size:12px"><span class="spin" style="width:16px;height:16px;display:block;margin:0 auto 10px"></span>Завантаження...</div>`
const errorHTML = msg => `<div style="padding:32px;text-align:center;color:var(--red);font-family:var(--mono);font-size:12px">⚠ ${msg}</div>`

// ════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('l-email').value.trim()
  const password = document.getElementById('l-pass').value
  const btn = document.getElementById('l-btn')
  const errEl = document.getElementById('l-err')
  errEl.textContent = ''

  if (!email || !password) { errEl.textContent = 'Введіть email та пароль'; return }

  btn.disabled = true
  btn.innerHTML = '<span class="spin"></span> Вхід...'

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Login failed') }
    const data = await res.json()
    accessToken = data.accessToken
    currentUser = data.user
    enterApp()
  } catch (e) {
    errEl.textContent = e.message
  } finally {
    btn.disabled = false
    btn.innerHTML = 'Увійти →'
  }
}

async function tryAutoLogin() {
  try {
    const res = await fetch('/api/auth/refresh', { method: 'POST' })
    if (!res.ok) return
    accessToken = (await res.json()).accessToken
    const pl = JSON.parse(atob(accessToken.split('.')[1]))
    currentUser = { id: pl.sub, email: pl.email, role: pl.role, is_active: true }
    enterApp()
  } catch {}
}

function enterApp() {
  document.getElementById('login').style.display = 'none'

  go(ROLES[currentUser.role].nav[0].id)
}

async function doLogout() {
  try { await fetch('/api/auth/logout', { method: 'POST' }) } catch {}
  accessToken = null
  currentUser = null
  document.getElementById('app').style.display = 'none'

let _taskView = 'kanban'  // 'list' | 'kanban'

function renderTasksInPlace(tabEl) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tabEl))
  const area = document.getElementById('tasks-view-area')
  if (!area) return
  // Re-use cached tasks from parent context
  if (window._cachedTasks) area.innerHTML = _taskView==='kanban' ? kanbanHTML(window._cachedTasks) : taskListTabsHTML(window._cachedTasks)
}

function taskListTabsHTML(tasks) {
  const today = new Date(); today.setHours(0,0,0,0)
  const tom = new Date(today); tom.setDate(tom.getDate()+1)
  const twoW = new Date(today); twoW.setDate(twoW.getDate()+14)

  const active = tasks.filter(t=>t.status!=='DONE')
  const done   = tasks.filter(t=>t.status==='DONE')

  const todayT = active.filter(t=>t.deadline && new Date(new Date(t.deadline).setHours(0,0,0,0))<=today.getTime())
  const tomT   = active.filter(t=>{
    if(!t.deadline) return false
    const d=new Date(new Date(t.deadline).setHours(0,0,0,0))
    return d.getTime()===tom.getTime()
  })
  const soonT  = active.filter(t=>{
    if(!t.deadline) return false
    const d=new Date(new Date(t.deadline).setHours(0,0,0,0))
    return d>tom && d<=twoW
  })
  const noDate = active.filter(t=>!t.deadline)

  const tRow = (t,showOv=true) => {
    const ov = showOv && isOverdue(t)
    return `<tr class="${t.status==='DONE'?'done-row':ov?'ov-row':''}">
      <td>${ov?'<span class="od-dot"></span>':''}<span class="cm">${t.title}</span></td>
      <td>${priDot(t.priority)}</td>
      <td>${t.assignee?.email||'—'}</td>
      <td>${taskStatusSel(t)}</td>
      <td style="color:${ov?'var(--red)':'var(--text3)'}">${t.deadline?fmt(t.deadline):'—'}</td>
    </tr>`
  }
  const tbl = (rows) => rows.length===0 ? emptyHTML('Немає задач') : `<table>
    <thead><tr><th>Задача</th><th>Пріоритет</th><th>Виконавець</th><th>Статус</th><th>Дедлайн</th></tr></thead>
    <tbody>${rows.map(t=>tRow(t)).join('')}</tbody></table>`

  return `
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'tl-today')">Сьогодні <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${todayT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-tom')">Завтра <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${tomT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-soon')">2 тижні <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${soonT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-nd')">Без дати <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${noDate.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-done')">Виконані <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${done.length}</span></div>
    </div>
    <div class="section" id="tl-today">${tbl(todayT)}</div>
    <div class="section" id="tl-tom" style="display:none">${tbl(tomT)}</div>
    <div class="section" id="tl-soon" style="display:none">${tbl(soonT)}</div>
    <div class="section" id="tl-nd" style="display:none">${tbl(noDate)}</div>
    <div class="section" id="tl-done" style="display:none">${tbl(done)}</div>`
}

function kanbanHTML(tasks) {
  const cols = [
    { status:'TODO',        label:'До виконання', color:'var(--text3)' },
    { status:'IN_PROGRESS', label:'В роботі',      color:'var(--violet)' },
    { status:'REVIEW',      label:'На перевірці',  color:'var(--yellow)' },

  return `<div class="kanban">${cols.map(col=>{
    const ct = tasks.filter(t=>t.status===col.status)
    return `<div class="kancol">
      <div class="kancol-h">
        <span class="kancol-title" style="color:${col.color}">${col.label}</span>
        <span class="kancol-cnt">${ct.length}</span>
      </div>
      ${ct.length===0?`<div style="padding:16px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--text3)">—</div>`:
        ct.map(t=>{
          const ov=isOverdue(t)

            <div class="kancard-title">${ov?'<span class="od-dot"></span>':''}${t.title}</div>
            <div class="kancard-meta">
              ${priDot(t.priority)}

function overdueHTML(tasks) {

}

// Fetch all tasks across visible projects
async function fetchAllTasks(projects) {
  const results = await Promise.all(
    projects.map(p => api(`/api/projects/${p.id}/tasks`).then(r => r.ok ? r.json() : []).catch(() => []))
  )
  return results.flat()
}

// ════════════════════════════════════════
// TASK STATUS PATCH
// ════════════════════════════════════════
async function patchTaskStatus(taskId, newStatus, selectEl) {
  const prev = [...selectEl.options].find(o => o.value !== newStatus && o.defaultSelected)?.value
    || selectEl.dataset.prev || selectEl.value
  selectEl.dataset.prev = selectEl.value
  selectEl.disabled = true
  try {
    const res = await api(`/api/tasks/${taskId}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus }),
    })
    if (!res.ok) {
      const e = await res.json()
      alert(e.error || 'Помилка зміни статусу')
      selectEl.value = selectEl.dataset.prev || prev
    } else {
      selectEl.dataset.prev = newStatus
    }
  } catch {
    selectEl.value = selectEl.dataset.prev || prev
  } finally {
    selectEl.disabled = false
  }
}

async function patchLeadStatus(leadId, newStatus, selectEl) {
  const prev = selectEl.dataset.prev || selectEl.value
  selectEl.dataset.prev = newStatus
  selectEl.disabled = true
  try {
    const res = await api(`/api/leads/${leadId}`, { method:'PATCH', body: JSON.stringify({ status: newStatus }) })
    if (!res.ok) { const e = await res.json(); alert(e.error||'Помилка'); selectEl.value = prev; selectEl.dataset.prev = prev }
    else { rLeads() } // refresh stats
  } catch { selectEl.value = prev; selectEl.dataset.prev = prev }
  finally { selectEl.disabled = false }
}

    new Date(r.date).toISOString().split('T')[0], r.amount, r.project?.name||'']

  const blob = new Blob([[header,...rows].join('\n')], {type:'text/csv;charset=utf-8;'})

  const a = document.createElement('a'); a.href=url; a.download=`finance-${Date.now()}.csv`; a.click()

    rTeam()
  } catch(e) { alert(e.message) }
}

let _privTab = null

async function rWorkspace() {
  setPage('Workspace', 'Приватний простір — тільки для Ops & Sales')
  document.getElementById('pcontent').innerHTML = loadingHTML()
  try {
    const res = await api('/api/tasks/private')
    if (!res.ok) throw new Error('Помилка завантаження')
    const tasks = await res.json()

    // Group by creator
    const byOwner = {}
    tasks.forEach(t => {
      const key = t.creator.id
      if (!byOwner[key]) byOwner[key] = { label: t.creator.name || t.creator.email, tasks: [] }
      byOwner[key].tasks.push(t)
    })

    // Add current user tab if not present
    if (!byOwner[currentUser.id]) {
      byOwner[currentUser.id] = { label: currentUser.name || currentUser.email, tasks: [] }
    }

    const owners = Object.entries(byOwner)
    if (!_privTab) _privTab = owners[0]?.[0]

    document.getElementById('pcontent').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="tabs" style="margin-bottom:0">
          ${owners.map(([id,o])=>`<div class="tab${_privTab===id?' active':''}" onclick="_privTab='${id}';rWorkspace()">${o.label}</div>`).join('')}
        </div>
        <button class="sbtn p" onclick="openPrivTaskModal()">+ Нова задача</button>
      </div>
      ${owners.map(([id,o])=>`
        <div id="pw-${id}" style="${_privTab!==id?'display:none':''}">
          <div class="section">
            <div class="sh"><span class="sh-t">Активні <span style="color:var(--text3);font-weight:400">(${o.tasks.filter(t=>t.status!=='DONE').length})</span></span></div>
            ${privTasksHTML(o.tasks.filter(t=>t.status!=='DONE'))}
          </div>
          ${o.tasks.filter(t=>t.status==='DONE').length > 0 ? `
          <div class="section" style="margin-top:12px">
            <div class="sh"><span class="sh-t" style="color:var(--text3)">Виконані <span style="font-weight:400">(${o.tasks.filter(t=>t.status==='DONE').length})</span></span></div>
            ${privTasksHTML(o.tasks.filter(t=>t.status==='DONE'))}
          </div>`:''}</div>`).join('')}`
  } catch(e) { document.getElementById('pcontent').innerHTML = errorHTML(e.message) }
}

function privTasksHTML(tasks) {
  if (!tasks.length) return `<div class="priv-empty">Порожньо</div>`

// ════════════════════════════════════════
// LEADS FILTERS
// ════════════════════════════════════════
let _leadsFilters = { status:'', source:'', minAmt:'' }

function leadsFiltersHTML(leads) {
  const sources = [...new Set(leads.map(l=>l.source))].sort()
  return `<div class="leads-filters">
    <div class="lf-group">
      <div class="lf-label">Статус</div>
      <select class="lf-select" onchange="_leadsFilters.status=this.value;applyLeadsFilter()" >
        <option value="">Всі</option>
        ${['NEW','CONTACTED','PROPOSAL','WON','LOST'].map(s=>`<option value="${s}"${_leadsFilters.status===s?' selected':''}>${STATUS_UA[s]}</option>`).join('')}
      </select>
    </div>
    <div class="lf-group">
      <div class="lf-label">Джерело</div>
      <select class="lf-select" onchange="_leadsFilters.source=this.value;applyLeadsFilter()">
        <option value="">Всі</option>
        ${sources.map(s=>`<option value="${s}"${_leadsFilters.source===s?' selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="lf-group">
      <div class="lf-label">Мін. сума ($)</div>
      <input class="lf-input" type="number" min="0" placeholder="0" value="${_leadsFilters.minAmt}"
        onchange="_leadsFilters.minAmt=this.value;applyLeadsFilter()">
    </div>
    <button class="lf-reset" onclick="_leadsFilters={status:'',source:'',minAmt:''};rLeads()">↺ Скинути</button>
  </div>`
}

function applyLeadsFilter() {
  const all = window._allLeads || []
  const f = _leadsFilters
  const filtered = all.filter(l =>
    (!f.status || l.status===f.status) &&
    (!f.source || l.source===f.source) &&
    (!f.minAmt || l.amount >= Number(f.minAmt))
  )
  const won  = filtered.filter(l=>l.status==='WON').reduce((s,l)=>s+l.amount,0)
  const pipe = filtered.filter(l=>l.status!=='WON'&&l.status!=='LOST').reduce((s,l)=>s+l.amount,0)
  const el = document.getElementById('sc-tot'); if(el) el.textContent = filtered.length
  const ew = document.getElementById('sc-won'); if(ew) ew.textContent = cur(won)
  const ep = document.getElementById('sc-pipe'); if(ep) ep.textContent = cur(pipe)
  const tbl = document.getElementById('leads-table')
  if (tbl) tbl.innerHTML = leadsTableHTML(filtered)
}
