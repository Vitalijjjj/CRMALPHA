<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency OS — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#0f0f18;--bg3:#13131e;--bg4:#1a1a28;
  --border:#1e1e2e;--border2:#252535;
  --text:#e8e8f0;--text2:#8888a8;--text3:#555570;
  --violet:#7c6fcd;--violet2:#6356b5;--vglow:rgba(124,111,205,0.15);
  --cyan:#4dd9d9;--orange:#f0875a;--green:#4caf7d;
  --red:#e05c5c;--yellow:#d4a843;
  --r:10px;--mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}

/* ── LOGIN ── */
#login{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px}
.lw{width:100%;max-width:480px}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-box{width:38px;height:38px;background:var(--violet);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff}
.logo-name{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.login-sub{color:var(--text3);font-size:12px;margin-bottom:28px;font-family:var(--mono)}
.rc{width:100%;text-align:left;padding:15px 18px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:center;gap:14px}
.rc:hover{background:var(--bg4);border-color:#3a3a55;transform:translateX(3px)}
.ri{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.rm{flex:1}
.rt{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.rd{font-size:11px;color:var(--text3);font-family:var(--mono)}
.rtag{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid;flex-shrink:0}
.rarr{color:var(--text3);font-size:16px;transition:.15s}
.rc:hover .rarr{color:var(--text2);transform:translateX(2px)}
.lfoot{text-align:center;color:var(--text3);font-size:11px;margin-top:20px;font-family:var(--mono)}

/* ── APP ── */
#app{display:none;height:100vh}
.shell{display:flex;height:100%}

/* sidebar */
.sidebar{width:224px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%}
.slogo{display:flex;align-items:center;gap:8px;padding:18px 16px;border-bottom:1px solid var(--border)}
.slogo-box{width:28px;height:28px;background:var(--violet);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.snav{flex:1;padding:10px 8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .12s;color:var(--text2);font-size:13px;margin-bottom:1px}
.ni:hover{background:var(--bg4);color:var(--text)}
.ni.active{background:var(--vglow);color:var(--text);border:1px solid rgba(124,111,205,.2)}
.ni.active .nic{color:var(--violet)}
.nic{font-size:14px;width:16px;text-align:center;flex-shrink:0}
.suser{padding:12px;border-top:1px solid var(--border)}
.urow{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;background:var(--bg3);margin-bottom:6px}
.uav{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;border:1px solid}
.uname{font-size:12px;font-weight:500;color:var(--text)}
.urole{font-family:var(--mono);font-size:9px;margin-top:1px}
.logout{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.logout:hover{background:var(--bg4);color:var(--text2)}

/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.tb-title{font-size:14px;font-weight:600;flex:1}
.tb-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.notif{width:30px;height:30px;border-radius:8px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:13px;flex-shrink:0}
.ndot{position:absolute;top:5px;right:5px;width:5px;height:5px;background:var(--red);border-radius:50%}
.content{flex:1;overflow-y:auto;padding:24px}

/* stat cards */
.sg{display:grid;gap:12px;margin-bottom:20px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px}
.sc-l{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.sc-v{font-size:26px;font-weight:700;letter-spacing:-1px;color:var(--text)}
.sc-v.d{color:var(--red)}.sc-v.s{color:var(--green)}.sc-v.w{color:var(--yellow)}
.sc-t{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:6px}

/* section */
.section{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.sh{display:flex;align-items:center;gap:8px;padding:14px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sh-t{font-size:13px;font-weight:600;flex:1}
.sbtn{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .12s;font-family:var(--sans)}
.sbtn:hover{background:var(--bg4);color:var(--text)}
.sbtn.p{background:var(--violet);border-color:var(--violet);color:#fff}
.sbtn.p:hover{background:var(--violet2)}

/* table */
table{width:100%;border-collapse:collapse}
thead th{padding:10px 16px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg4)}
td{padding:11px 16px;font-size:12px;color:var(--text2);white-space:nowrap}
.cm{color:var(--text);font-weight:500;font-size:13px}

/* badge */
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;border:1px solid;white-space:nowrap}
.bv{background:rgba(124,111,205,.15);color:#a99de8;border-color:rgba(124,111,205,.3)}
.bc{background:rgba(77,217,217,.08);color:var(--cyan);border-color:rgba(77,217,217,.25)}
.bo{background:rgba(240,135,90,.08);color:var(--orange);border-color:rgba(240,135,90,.25)}
.bg_{background:rgba(76,175,125,.08);color:var(--green);border-color:rgba(76,175,125,.25)}
.br{background:rgba(224,92,92,.08);color:var(--red);border-color:rgba(224,92,92,.25)}
.by{background:rgba(212,168,67,.08);color:var(--yellow);border-color:rgba(212,168,67,.25)}
.bgr{background:rgba(255,255,255,.04);color:var(--text3);border-color:var(--border2)}

/* tabs */
.tabs{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:3px;margin-bottom:16px;width:fit-content}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text3);transition:all .12s;font-weight:500;user-select:none}
.tab.active{background:var(--bg4);color:var(--text);border:1px solid var(--border2)}

/* progress */
.pbw{display:flex;align-items:center;gap:8px}
.pb{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;min-width:60px}
.pf{height:100%;border-radius:2px;background:var(--violet)}
.pf.hi{background:var(--green)}.pf.lo{background:var(--red)}
.pl{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:28px;text-align:right}

/* AI block */
.ai-block{background:var(--bg3);border:1px solid rgba(124,111,205,.25);border-radius:var(--r);padding:18px;margin-bottom:20px}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ai-ico{width:30px;height:30px;background:rgba(124,111,205,.15);border:1px solid rgba(124,111,205,.3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ai-ttl{font-size:13px;font-weight:600}
.ai-stl{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.mock-tag{font-family:var(--mono);font-size:9px;padding:2px 7px;background:rgba(124,111,205,.1);color:var(--violet);border:1px solid rgba(124,111,205,.2);border-radius:20px;margin-left:auto}
.ai-row{display:flex;gap:8px}
.ai-inp{flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border .15s}
.ai-inp:focus{border-color:rgba(124,111,205,.5)}
.ai-inp::placeholder{color:var(--text3)}
.ai-mic{padding:9px 13px;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:13px;cursor:pointer;flex-shrink:0}
.ai-run{padding:9px 18px;background:var(--violet);border:none;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .15s;display:flex;align-items:center;gap:6px;flex-shrink:0}
.ai-run:hover{background:var(--violet2)}
.ai-run:disabled{opacity:.5;cursor:not-allowed}
.ai-res{margin-top:14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;display:none}
.ai-res pre{font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre-wrap;line-height:1.75}
.ai-acts{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.ai-act{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .12s}
.ai-act:hover{background:var(--bg4);color:var(--text2)}
.ai-act.notion{color:var(--violet);border-color:rgba(124,111,205,.3)}

/* project cards */
.pcards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.pcard{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:18px}
.pcard-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pcard-n{font-size:13px;font-weight:600;margin-bottom:3px}
.pcard-c{font-family:var(--mono);font-size:10px;color:var(--text3)}
.pcard-f{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.pcard-d{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* login form */
.lform{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.lfield{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border .15s;width:100%}
.lfield:focus{border-color:rgba(124,111,205,.5)}
.lfield::placeholder{color:var(--text3)}
.lbtn{width:100%;padding:12px;background:var(--violet);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.lbtn:hover{background:var(--violet2)}
.lbtn:disabled{opacity:.5;cursor:not-allowed}
.lerr{color:var(--red);font-family:var(--mono);font-size:11px;text-align:center;min-height:16px}
.lsep{display:flex;align-items:center;gap:10px;margin:16px 0 12px;color:var(--text3);font-size:11px;font-family:var(--mono)}
.lsep::before,.lsep::after{content:'';flex:1;height:1px;background:var(--border)}
/* overdue */
.ov-row{background:rgba(224,92,92,.03)}
.od-dot{display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-right:6px;vertical-align:middle}

/* spinner */
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* responsive */
@media(max-width:768px){
  .sidebar{width:52px}
  .slogo span,.ni span:last-child,.uname,.urole,.logout{display:none}
  .ni{justify-content:center;padding:8px}
  .nic{width:auto}
  .sg4{grid-template-columns:repeat(2,1fr)}
  .pcards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ════════ LOGIN ════════ -->
<div id="login">
<div class="lw">
  <div class="logo-row">
    <div class="logo-box">A</div>
    <span class="logo-name">Agency OS</span>
  </div>
  <div class="login-sub">внутрішня система управління агентством · увійдіть щоб продовжити</div>
  <div class="lform">
    <input id="l-email" class="lfield" type="email" placeholder="Електронна пошта" autocomplete="email"/>
    <input id="l-pass"  class="lfield" type="password" placeholder="Пароль" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <div class="lerr" id="l-err"></div>
  <button class="lbtn" id="l-btn" onclick="doLogin()" style="margin-top:4px">Увійти →</button>
  <div class="lsep">швидкий вхід — тестові акаунти</div>
  <div id="role-cards"></div>
  <div class="lfoot">JWT авторизація · Argon2id · PostgreSQL · Vercel</div>
</div>
</div>

<!-- ════════ APP ════════ -->
<div id="app">
<div class="shell">

  <div class="sidebar">
    <div class="slogo">
      <div class="slogo-box">A</div>
      <span style="font-size:14px;font-weight:700;letter-spacing:-.3px">Agency OS</span>
    </div>
    <nav class="snav" id="snav"></nav>
    <div class="suser">
      <div class="urow">
        <div class="uav" id="uav"></div>
        <div>
          <div class="uname" id="uname"></div>
          <div class="urole" id="urole"></div>
        </div>
      </div>
      <button class="logout" onclick="doLogout()">↩ Вийти</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div style="flex:1">
        <div class="tb-title" id="ptitle">Dashboard</div>
        <div class="tb-sub" id="psub"></div>
      </div>
      <div class="notif">🔔<div class="ndot"></div></div>
    </div>
    <div class="content" id="pcontent"></div>
  </div>

</div>
</div>

<script>
// ════════════════════════════════════════
// TOKEN STORE  (access token in memory only)
// ════════════════════════════════════════
let accessToken = null
let currentUser = null  // { id, email, role, is_active }

// ════════════════════════════════════════
// API CLIENT  — adds Bearer, auto-refreshes
// ════════════════════════════════════════
async function api(path, opts = {}) {
  const hdrs = { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  if (accessToken) hdrs['Authorization'] = 'Bearer ' + accessToken

  let res = await fetch(path, { ...opts, headers: hdrs })

  if (res.status === 401 && accessToken) {
    const r = await fetch('/api/auth/refresh', { method: 'POST' })
    if (r.ok) {
      accessToken = (await r.json()).accessToken
      hdrs['Authorization'] = 'Bearer ' + accessToken
      res = await fetch(path, { ...opts, headers: hdrs })
    } else {
      doLogout()
      throw new Error('Session expired')
    }
  }
  return res
}

// ════════════════════════════════════════
// MOCK DATA  (Leads & Finance — no API yet)
// ════════════════════════════════════════
const NOW = new Date()
const dOff = n => { const x = new Date(NOW); x.setDate(x.getDate()+n); return x.toISOString().split('T')[0] }

const LEADS = [
  {id:'l1',name:'Петро Коваленко',src:'Реферал',st:'CONTACTED',amt:3500,cr:dOff(-10),cm:'Корпоративний сайт'},
  {id:'l2',name:'Марина Лисенко',src:'Instagram',st:'WON',amt:1800,cr:dOff(-20),cm:'Лендінг косметика'},
  {id:'l3',name:'Oleks Design Studio',src:'Upwork',st:'PROPOSAL',amt:5200,cr:dOff(-5),cm:'White-label розробка'},
  {id:'l4',name:'Nova Logistics',src:'Сайт',st:'NEW',amt:4000,cr:dOff(-2)},
  {id:'l5',name:'Grill House',src:'Реферал',st:'CONTACTED',amt:1200,cr:dOff(-7),cm:'Меню + бронювання'},
  {id:'l6',name:'MindSpark Agency',src:'Партнер',st:'WON',amt:7800,cr:dOff(-30),cm:'Довгостроковий контракт'},
  {id:'l7',name:'EcoShop Ukraine',src:'Холодний контакт',st:'LOST',amt:2200,cr:dOff(-15),cm:'Обрали іншого'},
  {id:'l8',name:'Fit Academy',src:'Instagram',st:'PROPOSAL',amt:3100,cr:dOff(-3),cm:'Фітнес-клуб'},
]
const FINANCE = [
  {type:'INCOME',amt:2500,dt:dOff(-25),cat:'Project Payment',desc:'AutoBrand — 50% передоплата'},
  {type:'INCOME',amt:1800,dt:dOff(-18),cat:'Project Payment',desc:'KFC Landing — 100% оплата'},
  {type:'EXPENSE',amt:99,dt:dOff(-20),cat:'Software',desc:'Figma subscription'},
  {type:'INCOME',amt:3200,dt:dOff(-10),cat:'Project Payment',desc:'FashionStore — фінальна'},
  {type:'EXPENSE',amt:299,dt:dOff(-15),cat:'Software',desc:'Webflow Business plan'},
  {type:'INCOME',amt:1500,dt:dOff(-8),cat:'Project Payment',desc:'TechBlog — 50% передоплата'},
  {type:'EXPENSE',amt:450,dt:dOff(-5),cat:'Contractor',desc:'Дизайнер — AutoBrand'},
  {type:'INCOME',amt:2000,dt:dOff(-3),cat:'Project Payment',desc:'MedClinic — передоплата'},
  {type:'EXPENSE',amt:120,dt:dOff(-1),cat:'Marketing',desc:'Instagram реклама'},
  {type:'INCOME',amt:7800,dt:dOff(-30),cat:'Retainer',desc:'MindSpark — ретейнер'},
]

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
const fmt = s => new Date(s).toLocaleDateString('uk-UA', {day:'numeric', month:'short'})
const cur = n => '$' + Number(n).toLocaleString()
const isOverdue = t => t.deadline && new Date(t.deadline) < NOW && t.status !== 'DONE'

const SC = {
  ACTIVE:'bg_', COMPLETED:'bc', ON_HOLD:'bgr', CANCELLED:'br',
  TODO:'bgr', IN_PROGRESS:'bv', REVIEW:'by', DONE:'bg_',
  NEW:'bgr', CONTACTED:'bv', PROPOSAL:'by', WON:'bg_', LOST:'br',
}
const STATUS_UA = {
  ACTIVE:'Активний', COMPLETED:'Завершено', ON_HOLD:'На паузі', CANCELLED:'Скасовано',
  TODO:'До виконання', IN_PROGRESS:'В роботі', REVIEW:'На перевірці', DONE:'Готово',
  NEW:'Новий', CONTACTED:'Контакт', PROPOSAL:'Пропозиція', WON:'Виграно', LOST:'Програно',
  INCOME:'Дохід', EXPENSE:'Витрата',
}
const badge = (s, l) => `<span class="badge ${SC[s]||'bgr'}">${l || STATUS_UA[s] || s.replace(/_/g,' ')}</span>`

const PC = {LOW:'#555570', MEDIUM:'#d4a843', HIGH:'#f0875a', URGENT:'#e05c5c'}
const PRI_UA = {LOW:'Низький', MEDIUM:'Середній', HIGH:'Високий', URGENT:'Критичний'}
const priDot = p => `<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${PC[p]||'#555570'};margin-right:5px;vertical-align:middle"></span>${PRI_UA[p]||p}`

function renderLogin() {
  document.getElementById('role-cards').innerHTML = Object.entries(ROLES).map(([role, cfg]) => `
    <button class="rc" onclick="quickLogin('${cfg.desc}')">
      <div class="ri" style="background:${cfg.bg}">${cfg.icon}</div>
      <div class="rm">
        <div class="rt">${cfg.label}</div>
        <div class="rd">${cfg.desc} · пароль: password123</div>
      </div>
      <span class="rtag badge ${cfg.tc}" style="font-size:9px">${role}</span>
      <span class="rarr">→</span>
    </button>
  `).join('')
}

function quickLogin(email) {
  document.getElementById('l-email').value = email
  document.getElementById('l-pass').value = 'password123'
  doLogin()
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim()
  const password = document.getElementById('l-pass').value
  const btn = document.getElementById('l-btn')
  const errEl = document.getElementById('l-err')
  errEl.textContent = ''

  if (!email || !password) { errEl.textContent = 'Введіть email та пароль'; return }

  btn.disabled = true
  btn.innerHTML = '<span class="spin"></span> Вхід...'

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Login failed') }
    const data = await res.json()
    accessToken = data.accessToken
    currentUser = data.user
    enterApp()
  } catch (e) {
    errEl.textContent = e.message
  } finally {
    btn.disabled = false
    btn.innerHTML = 'Увійти →'
  }
}

async function tryAutoLogin() {
  try {
    const res = await fetch('/api/auth/refresh', { method: 'POST' })
    if (!res.ok) return
    accessToken = (await res.json()).accessToken
    const pl = JSON.parse(atob(accessToken.split('.')[1]))
    currentUser = { id: pl.sub, email: pl.email, role: pl.role, is_active: true }
    enterApp()
  } catch {}
}

function enterApp() {
  document.getElementById('login').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  setupShell()
  go(ROLES[currentUser.role].nav[0].id)
}

async function doLogout() {
  try { await fetch('/api/auth/logout', { method: 'POST' }) } catch {}
  accessToken = null
  currentUser = null
  document.getElementById('app').style.display = 'none'
  document.getElementById('login').style.display = 'flex'
}

function setupShell() {
  const role = currentUser.role
  const cfg = ROLES[role]
  document.getElementById('uav').textContent = currentUser.email.charAt(0).toUpperCase()
  document.getElementById('uav').style.cssText = AV_STYLE[role]
  document.getElementById('uname').textContent = currentUser.email
  const roleEl = document.getElementById('urole')
  roleEl.textContent = role
  roleEl.style.color = role==='OPERATIONS_SALES'?'#a99de8':role==='PM'?'#4dd9d9':'#f0875a'
  document.getElementById('snav').innerHTML = cfg.nav.map(n => `
    <div class="ni" id="ni-${n.id}" onclick="go('${n.id}')">
      <span class="nic">${n.ic}</span><span>${n.l}</span>
    </div>
  `).join('')
}

function go(id) {
  document.querySelectorAll('.ni').forEach(el => el.classList.toggle('active', el.id==='ni-'+id))
  ;({overview:rOverview, pm:rPM, dev:rDev, projects:rProjects, tasks:rTasks, leads:rLeads, finance:rFinance})[id]?.()
}

function setPage(t, s) {
  document.getElementById('ptitle').textContent = t
  document.getElementById('psub').textContent = s
}

function switchTab(el, showId) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t===el))
  let sib = el.closest('.tabs').nextElementSibling
  while(sib){ if(!sib.classList.contains('tabs')) sib.style.display = sib.id===showId?'':'none'; sib=sib.nextElementSibling }
}

// Fetch all tasks across visible projects
async function fetchAllTasks(projects) {
  const results = await Promise.all(
    projects.map(p => api(`/api/projects/${p.id}/tasks`).then(r => r.ok ? r.json() : []).catch(() => []))
  )
  return results.flat()
}

function rFinance() {
  setPage('Фінанси', 'Доходи, витрати та фінанси проєктів')
  const inc = FINANCE.filter(f=>f.type==='INCOME').reduce((s,f)=>s+f.amt,0)
  const exp = FINANCE.filter(f=>f.type==='EXPENSE').reduce((s,f)=>s+f.amt,0)
  document.getElementById('pcontent').innerHTML = `
    <div class="sg sg3">
      <div class="sc"><div class="sc-l">↑ Дохід</div><div class="sc-v s">${cur(inc)}</div></div>
      <div class="sc"><div class="sc-l">↓ Витрати</div><div class="sc-v d">${cur(exp)}</div></div>
      <div class="sc"><div class="sc-l">= Прибуток</div><div class="sc-v">${cur(inc-exp)}</div></div>
    </div>
    ${financeHTML()}`
}

function financeHTML() {
  return `<div class="section">
    <div class="sh">
      <span class="sh-t">Транзакції</span>
      <button class="sbtn">Експорт CSV</button><button class="sbtn p">+ Додати запис</button>
    </div>
    <table>
      <thead><tr><th>Тип</th><th>Опис</th><th>Категорія</th><th>Дата</th><th>Сума</th></tr></thead>
      <tbody>${FINANCE.map(f=>`<tr>
        <td><span class="badge ${f.type==='INCOME'?'bg_':'br'}">${f.type}</span></td>
        <td><span class="cm">${f.desc}</span></td>
        <td><span class="badge bgr">${f.cat}</span></td>
        <td>${fmt(f.dt)}</td>
        <td style="font-weight:600;color:${f.type==='INCOME'?'var(--green)':'var(--red)'}">
          ${f.type==='INCOME'?'+':'−'}${cur(f.amt)}
        </td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`
}
