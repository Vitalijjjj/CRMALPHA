<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agency OS — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080809;--bg2:#0d0d10;--bg3:rgba(255,255,255,0.028);--bg4:rgba(255,255,255,0.055);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.09);
  --text:#F0F0F8;--text2:#72728A;--text3:#42424E;
  --gold:#FFD600;--gold2:#FF8C00;
  --gold-grad:linear-gradient(135deg,#FFD600 0%,#FF8C00 100%);
  --gold-glow:rgba(255,214,0,0.12);--gold-glow2:rgba(255,140,0,0.08);
  --violet:#7c6fcd;--violet2:#6356b5;--vglow:rgba(124,111,205,0.12);
  --cyan:#4dd9d9;--orange:#f0875a;--green:#3dba7a;
  --red:#e05c5c;--yellow:#FFD600;
  --r:14px;--r2:20px;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --glass:rgba(255,255,255,0.03);--glass-b:rgba(255,255,255,0.08);
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --shadow-gold:0 0 24px rgba(255,214,0,0.18);
  --t:cubic-bezier(0.23,1,0.32,1);
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;
  background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,180,0,0.04) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 100% 100%,rgba(124,111,205,0.03) 0%,transparent 60%);
}

/* ══ ANIMATIONS ══ */
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 0 rgba(255,214,0,0)}50%{box-shadow:0 0 20px rgba(255,214,0,0.12)}}
@keyframes slideRight{from{transform:translateX(-8px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes countUp{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}

.anim-up{animation:fadeUp .5s var(--t) both}
.anim-up:nth-child(1){animation-delay:.03s}
.anim-up:nth-child(2){animation-delay:.08s}
.anim-up:nth-child(3){animation-delay:.13s}
.anim-up:nth-child(4){animation-delay:.18s}

/* ══ LOGIN ══ */
#login{display:flex;align-items:center;justify-content:center;height:100vh;padding:24px;
  background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(255,180,0,0.06) 0%,transparent 65%)}
.lw{width:100%;max-width:420px;animation:fadeUp .6s var(--t) both}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.logo-box{width:42px;height:42px;background:var(--gold-grad);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#000;box-shadow:var(--shadow-gold)}
.logo-name{font-size:24px;font-weight:700;letter-spacing:-0.8px}
.login-sub{color:var(--text3);font-size:11px;margin-bottom:32px;font-family:var(--mono);letter-spacing:.02em}
.lfoot{text-align:center;color:var(--text3);font-size:10px;margin-top:22px;font-family:var(--mono)}

/* ── Login card ── */
.lform-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:28px;backdrop-filter:blur(20px);box-shadow:0 24px 64px rgba(0,0,0,0.5)}
.lform{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.lfield{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:12px 15px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border .2s,box-shadow .2s;width:100%}
.lfield:focus{border-color:rgba(255,214,0,0.4);box-shadow:0 0 0 3px rgba(255,214,0,0.06)}
.lfield::placeholder{color:var(--text3)}
.lbtn{width:100%;padding:13px;background:var(--gold-grad);border:none;border-radius:10px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .25s var(--t);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(255,180,0,0.25)}
.lbtn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(255,180,0,0.35)}
.lbtn:active{transform:scale(0.98)}
.lbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.lerr{color:var(--red);font-family:var(--mono);font-size:11px;text-align:center;min-height:16px;margin-top:8px}

/* ══ APP ══ */
#app{display:none;height:100vh}
.shell{display:flex;height:100%}

/* ── Sidebar ── */
.sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,0.02);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;backdrop-filter:blur(10px)}
.slogo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--border)}
.slogo-box{width:30px;height:30px;background:var(--gold-grad);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000;flex-shrink:0;box-shadow:0 2px 12px rgba(255,180,0,0.25)}
.snav{flex:1;padding:10px 8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:all .2s var(--t);color:var(--text2);font-size:13px;margin-bottom:2px;position:relative;border:1px solid transparent}
.ni:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.ni.active{background:linear-gradient(135deg,rgba(255,214,0,0.1),rgba(255,140,0,0.06));color:var(--text);border-color:rgba(255,214,0,0.18)}
.ni.active .nic{background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nic{font-size:15px;width:17px;text-align:center;flex-shrink:0;transition:all .2s}
.suser{padding:12px;border-top:1px solid var(--border)}
.urow{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;background:rgba(255,255,255,0.03);margin-bottom:6px;border:1px solid var(--border)}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:1px solid;overflow:hidden}
.uname{font-size:12px;font-weight:600;color:var(--text)}
.urole{font-family:var(--mono);font-size:9px;margin-top:1px}
.logout{width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.logout:hover{background:rgba(255,255,255,0.04);color:var(--text2);border-color:var(--border2)}

/* ── Main area ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01);backdrop-filter:blur(10px);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-.2px}
.tb-sub{font-size:10px;color:var(--text3);font-family:var(--mono)}
.notif{width:32px;height:32px;border-radius:9px;background:var(--glass);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;flex-shrink:0;transition:all .2s}
.notif:hover{background:var(--bg4);border-color:rgba(255,214,0,0.2)}
.ndot{position:absolute;top:6px;right:6px;width:5px;height:5px;background:var(--gold);border-radius:50%;box-shadow:0 0 6px rgba(255,214,0,0.6)}
.content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

/* ── Stat cards ── */
.sg{display:grid;gap:14px;margin-bottom:22px}
.sg4{grid-template-columns:repeat(4,1fr)}
.sg3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r2);padding:20px 22px;backdrop-filter:blur(20px);transition:all .3s var(--t);cursor:default;animation:fadeUp .4s var(--t) both}
.sc:hover{border-color:rgba(255,214,0,0.18);transform:translateY(-3px);box-shadow:var(--shadow-gold),0 16px 40px rgba(0,0,0,0.3)}
.sc-l{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.sc-v{font-size:28px;font-weight:700;letter-spacing:-1.5px;color:var(--text)}
.sc-v.d{color:var(--red)}.sc-v.s{color:var(--green)}.sc-v.w{color:var(--gold)}
.sc-t{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:8px}

/* ── Sections ── */
.section{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r2);overflow:hidden;margin-bottom:18px;backdrop-filter:blur(16px);animation:fadeUp .45s var(--t) both}
.sh{display:flex;align-items:center;gap:8px;padding:15px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.sh-t{font-size:13px;font-weight:600;flex:1;letter-spacing:-.1px}

/* ── Buttons ── */
.sbtn{font-size:11px;padding:6px 13px;border-radius:8px;border:1px solid var(--border2);background:rgba(255,255,255,0.04);color:var(--text2);cursor:pointer;transition:all .2s var(--t);font-family:var(--sans);font-weight:500}
.sbtn:hover{background:rgba(255,255,255,0.07);color:var(--text);border-color:rgba(255,255,255,0.14);transform:translateY(-1px)}
.sbtn:active{transform:scale(0.97)}
.sbtn.p{background:var(--gold-grad);border:none;color:#000;font-weight:700;box-shadow:0 3px 14px rgba(255,180,0,0.22)}
.sbtn.p:hover{box-shadow:0 6px 20px rgba(255,180,0,0.35);transform:translateY(-2px)}
.sbtn.d{border-color:rgba(224,92,92,0.3);color:var(--red);background:transparent}
.sbtn.d:hover{background:rgba(224,92,92,0.08);border-color:rgba(224,92,92,0.5)}

/* ── Tables ── */
table{width:100%;border-collapse:collapse}
thead th{padding:11px 18px;text-align:left;font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .18s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,0.025)}
td{padding:12px 18px;font-size:12px;color:var(--text2);white-space:nowrap}
.cm{color:var(--text);font-weight:500;font-size:13px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;font-weight:500;border:1px solid;white-space:nowrap}
.bv{background:rgba(124,111,205,.12);color:#b0a8e8;border-color:rgba(124,111,205,.25)}
.bc{background:rgba(77,217,217,.07);color:var(--cyan);border-color:rgba(77,217,217,.22)}
.bo{background:rgba(240,135,90,.07);color:var(--orange);border-color:rgba(240,135,90,.22)}
.bg_{background:rgba(61,186,122,.07);color:var(--green);border-color:rgba(61,186,122,.22)}
.br{background:rgba(224,92,92,.07);color:var(--red);border-color:rgba(224,92,92,.22)}
.by{background:rgba(255,214,0,.07);color:var(--gold);border-color:rgba(255,214,0,.22)}
.bgr{background:rgba(255,255,255,.03);color:var(--text3);border-color:var(--border)}

/* ── Tabs ── */
.tabs{display:flex;gap:2px;background:rgba(255,255,255,0.03);border:1px solid var(--border2);border-radius:10px;padding:3px;margin-bottom:18px;width:fit-content}
.tab{padding:6px 17px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text3);transition:all .2s var(--t);font-weight:500;user-select:none}
.tab.active{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid rgba(255,255,255,0.1);box-shadow:0 2px 8px rgba(0,0,0,0.2)}

/* ── Progress ── */
.pbw{display:flex;align-items:center;gap:8px}
.pb{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;min-width:60px}
.pf{height:100%;border-radius:2px;background:var(--gold-grad)}
.pf.hi{background:linear-gradient(90deg,#3dba7a,#4dd9a8)}.pf.lo{background:var(--red)}
.pl{font-family:var(--mono);font-size:10px;color:var(--text3);min-width:28px;text-align:right}

/* ── AI block ── */
.ai-block{background:linear-gradient(135deg,rgba(124,111,205,0.07),rgba(77,217,217,0.04));border:1px solid rgba(124,111,205,.2);border-radius:var(--r2);padding:20px;margin-bottom:22px;backdrop-filter:blur(20px)}
.ai-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ai-ico{width:32px;height:32px;background:rgba(124,111,205,.15);border:1px solid rgba(124,111,205,.3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ai-ttl{font-size:13px;font-weight:600}
.ai-stl{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:2px}
.mock-tag{font-family:var(--mono);font-size:9px;padding:2px 8px;background:rgba(124,111,205,.1);color:var(--violet);border:1px solid rgba(124,111,205,.2);border-radius:20px;margin-left:auto}
.ai-row{display:flex;gap:8px}
.ai-inp{flex:1;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--text);font-family:var(--sans);outline:none;transition:border .2s,box-shadow .2s}
.ai-inp:focus{border-color:rgba(124,111,205,.5);box-shadow:0 0 0 3px rgba(124,111,205,.07)}
.ai-inp::placeholder{color:var(--text3)}
.ai-mic{padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:9px;color:var(--text2);font-size:14px;cursor:pointer;flex-shrink:0;transition:all .2s}
.ai-mic:hover{background:rgba(255,255,255,0.08)}
.ai-run{padding:10px 18px;background:var(--gold-grad);border:none;border-radius:9px;color:#000;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:700;transition:all .2s var(--t);display:flex;align-items:center;gap:6px;flex-shrink:0;box-shadow:0 3px 14px rgba(255,180,0,0.2)}
.ai-run:hover{box-shadow:0 6px 20px rgba(255,180,0,0.32);transform:translateY(-1px)}
.ai-run:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ai-res{margin-top:14px;background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:10px;padding:16px;display:none}
.ai-res pre{font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre-wrap;line-height:1.8}
.ai-acts{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}
.ai-act{font-size:11px;padding:5px 12px;border-radius:7px;border:1px solid var(--border2);background:rgba(255,255,255,0.03);color:var(--text3);cursor:pointer;font-family:var(--sans);transition:all .18s}
.ai-act:hover{background:rgba(255,255,255,0.06);color:var(--text2)}
.ai-act.notion{color:var(--violet);border-color:rgba(124,111,205,.3)}

/* ── Project cards ── */
.pcards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}
.pcard{background:var(--glass);border:1px solid var(--glass-b);border-radius:var(--r2);padding:20px;backdrop-filter:blur(16px);transition:all .3s var(--t)}
.pcard:hover{border-color:rgba(255,214,0,0.15);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.25)}
.pcard-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.pcard-n{font-size:13px;font-weight:600;margin-bottom:3px;letter-spacing:-.1px}
.pcard-c{font-family:var(--mono);font-size:10px;color:var(--text3)}
.pcard-f{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.pcard-d{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── Spinner ── */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.15);border-top-color:rgba(255,214,0,.8);border-radius:50%;animation:sp .7s linear infinite}

/* ── Responsive ── */
@media(max-width:768px){
  .sidebar{width:56px}
  .slogo span,.ni span:last-child,.uname,.urole,.logout{display:none}
  .ni{justify-content:center;padding:8px}
  .nic{width:auto}
  .sg4{grid-template-columns:repeat(2,1fr)}
  .pcards{grid-template-columns:1fr}
}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;animation:fadeIn .2s ease}
.modal{background:rgba(13,13,16,0.95);border:1px solid rgba(255,255,255,0.1);border-radius:var(--r2);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6);animation:fadeUp .3s var(--t) both;backdrop-filter:blur(20px)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-t{font-size:14px;font-weight:600;letter-spacing:-.1px}
.modal-x{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;line-height:1;padding:3px 7px;border-radius:6px;font-family:var(--sans);transition:all .18s}
.modal-x:hover{color:var(--text);background:rgba(255,255,255,0.07)}
.modal-b{padding:22px}
.mlabel{font-family:var(--mono);font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px}
.mfield{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--text);font-family:var(--sans);outline:none;transition:border .2s,box-shadow .2s;margin-bottom:16px;display:block}
.mfield:focus{border-color:rgba(255,214,0,0.35);box-shadow:0 0 0 3px rgba(255,214,0,0.06)}
.mfield::placeholder{color:var(--text3)}
select.mfield{cursor:pointer}
textarea.mfield{resize:vertical;line-height:1.6}
.mrow{display:flex;gap:12px}
.mrow .mhalf{flex:1}
.mrow .mhalf .mfield{margin-bottom:0}
.mfooter{display:flex;gap:8px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--border);margin-top:10px}
.merr{color:var(--red);font-family:var(--mono);font-size:11px;margin-bottom:14px;display:none;padding:9px 13px;background:rgba(224,92,92,.07);border:1px solid rgba(224,92,92,.18);border-radius:8px}
.mok{color:var(--green);font-family:var(--mono);font-size:11px;margin-bottom:14px;display:none;padding:9px 13px;background:rgba(61,186,122,.07);border:1px solid rgba(61,186,122,.18);border-radius:8px}

/* ── Status selects ── */
.status-sel{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:7px;padding:4px 9px;font-size:10px;color:var(--text2);font-family:var(--mono);cursor:pointer;outline:none;transition:border .2s}
.status-sel:focus{border-color:rgba(255,214,0,0.35)}

/* ── Date picker ── */
input[type=date].mfield{color-scheme:dark;cursor:pointer}
input[type=date].mfield::-webkit-calendar-picker-indicator{filter:invert(0.5) sepia(1) saturate(2) hue-rotate(0deg);cursor:pointer;opacity:.7}
input[type=date].mfield::-webkit-calendar-picker-indicator:hover{opacity:1}

/* ── Done rows ── */
tr.done-row{opacity:.35}
tr.done-row td{text-decoration:line-through;text-decoration-color:var(--text3)}
tr.done-row .cm{color:var(--text3)}
tr.done-row:hover{opacity:.45}

/* ══ KANBAN ══ */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kancol{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;backdrop-filter:blur(12px);transition:border-color .2s}
.kancol-h{padding:12px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.kancol-title{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;flex:1}

<script>
// ════════════════════════════════════════
// TOKEN STORE  (access token in memory only)
// ════════════════════════════════════════
// ════════════════════════════════════════
// ANIMATIONS & MICRO-INTERACTIONS
// ════════════════════════════════════════

// ── Cursor light
;(function() {
  const light = document.getElementById('cursor-light')
  if (!light) return
  let tx = window.innerWidth/2, ty = window.innerHeight/2
  let cx = tx, cy = ty
  let raf
  function lerp(a,b,t){return a+(b-a)*t}
  function tick(){
    cx = lerp(cx, tx, 0.06)
    cy = lerp(cy, ty, 0.06)
    light.style.transform = `translate(${cx-300}px,${cy-300}px)`
    raf = requestAnimationFrame(tick)
  }
  document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY })
  document.addEventListener('mouseenter', () => { light.style.opacity='1'; if(!raf) tick() })
  document.addEventListener('mouseleave', () => { light.style.opacity='0' })
  tick()
})()

// ── Ripple on buttons
document.addEventListener('click', e => {
  const btn = e.target.closest('.sbtn,.lbtn,.ai-run')
  if (!btn) return
  btn.classList.add('ripple-host')
  const r = document.createElement('span')
  r.className = 'ripple'
  const rect = btn.getBoundingClientRect()
  const size = Math.max(rect.width, rect.height)
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`
  btn.appendChild(r)
  setTimeout(() => r.remove(), 520)
})

// ── Animated counter
function animCounter(el, final, duration) {
  const raw = String(final)
  const prefix = raw.startsWith('$') ? '$' : ''
  const num = parseFloat(raw.replace(/[^0-9.]/g,''))
  if (isNaN(num) || num === 0) return
  const start = performance.now()
  const isInt = Number.isInteger(num)
  ;(function run(now) {
    const p = Math.min((now - start) / duration, 1)
    const ease = 1 - Math.pow(1 - p, 4)
    const v = num * ease
    el.textContent = prefix + (isInt ? Math.round(v).toLocaleString() : v.toFixed(1))
    if (p < 1) requestAnimationFrame(run)
    else el.textContent = prefix + num.toLocaleString()
  })(start)
}

function animateStatCards() {
  document.querySelectorAll('.sc-v').forEach((el, i) => {
    const raw = el.textContent.trim()
    if (!raw || raw === '—') return
    const saved = raw
    animCounter(el, saved, 700 + i * 80)
  })
}

// ── Page entrance — stagger fade+slide
function triggerPageAnim() {
  const els = [...document.querySelectorAll('.section,.sc,.pcard,.user-card')]
  els.forEach((el, i) => {
    el.style.cssText += ';opacity:0;transform:translateY(20px);transition:none'
    requestAnimationFrame(() => {
      setTimeout(() => {
        el.style.transition = 'opacity .5s cubic-bezier(0.23,1,0.32,1), transform .5s cubic-bezier(0.23,1,0.32,1), border-color .3s, box-shadow .3s'
        el.style.opacity = '1'
        el.style.transform = ''
      }, i * 55)
    })
  })
  // stagger table rows
  setTimeout(() => {
    document.querySelectorAll('tbody tr').forEach((tr, i) => {
      tr.style.cssText += ';opacity:0;transition:none'
      setTimeout(() => {
        tr.style.transition = 'opacity .35s ease, background .2s, box-shadow .2s'
        tr.style.opacity = '1'
      }, i * 28)
    })
    animateStatCards()
  }, 180)
}

// ── Nav item transition glow flash
function flashNavItem(el) {
  el.style.boxShadow = '0 0 14px rgba(255,214,0,0.18)'
  setTimeout(() => el.style.boxShadow = '', 400)
}

let accessToken = null
let currentUser = null  // { id, email, role, is_active }
let currentPage = null  // track active page for refreshes
let _finRecords = []   // cached for CSV export

// ════════════════════════════════════════
// API CLIENT  — adds Bearer, auto-refreshes
// ════════════════════════════════════════
async function api(path, opts = {}) {
  const hdrs = { 'Content-Type': 'application/json', ...(opts.headers || {}) }
  if (accessToken) hdrs['Authorization'] = 'Bearer ' + accessToken

  let res = await fetch(path, { ...opts, headers: hdrs })

  if (res.status === 401 && accessToken) {
    const r = await fetch('/api/auth/refresh', { method: 'POST' })
    if (r.ok) {
      accessToken = (await r.json()).accessToken
      hdrs['Authorization'] = 'Bearer ' + accessToken
      res = await fetch(path, { ...opts, headers: hdrs })
    } else {
      doLogout()
      throw new Error('Session expired')
    }
  }
  return res
}

const fmt = s => new Date(s).toLocaleDateString('uk-UA', {day:'numeric', month:'short'})
const cur = n => '$' + Number(n).toLocaleString()

  TODO:'До виконання', IN_PROGRESS:'В роботі', REVIEW:'На перевірці', DONE:'Готово',

// ════════════════════════════════════════
// ROLE CONFIG
// ════════════════════════════════════════

function openModal(title, bodyHTML) {
  document.getElementById('modal-title').textContent = title
  document.getElementById('modal-body').innerHTML = bodyHTML
  document.getElementById('modal-overlay').style.display = 'flex'
}
function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none'
}
function modalErr(msg) {
  const el = document.getElementById('m-err')
  if (!el) return
  el.textContent = msg; el.style.display = 'block'
}
function modalOk(msg) {
  const el = document.getElementById('m-ok')
  if (!el) return
  el.textContent = msg; el.style.display = 'block'
}
function modalBtnBusy(label) {
  const btn = document.querySelector('#modal-body .sbtn.p')
  if (btn) { btn.disabled = true; btn.innerHTML = `<span class="spin"></span> ${label}` }
}
function modalBtnRestore(label) {
  const btn = document.querySelector('#modal-body .sbtn.p')
  if (btn) { btn.disabled = false; btn.innerHTML = label }
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim()
  const password = document.getElementById('l-pass').value
  const btn = document.getElementById('l-btn')
  const errEl = document.getElementById('l-err')
  errEl.textContent = ''

  if (!email || !password) { errEl.textContent = 'Введіть email та пароль'; return }

  btn.disabled = true
  btn.innerHTML = '<span class="spin"></span> Вхід...'

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    })
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Login failed') }
    const data = await res.json()
    accessToken = data.accessToken
    currentUser = data.user
    enterApp()
  } catch (e) {
    errEl.textContent = e.message
  } finally {
    btn.disabled = false
    btn.innerHTML = 'Увійти →'
  }
}

async function tryAutoLogin() {
  try {
    const res = await fetch('/api/auth/refresh', { method: 'POST' })
    if (!res.ok) return
    accessToken = (await res.json()).accessToken
    const pl = JSON.parse(atob(accessToken.split('.')[1]))
    currentUser = { id: pl.sub, email: pl.email, role: pl.role, is_active: true }
    enterApp()
  } catch {}
}

function enterApp() {
  document.getElementById('login').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  setupShell()
  go(ROLES[currentUser.role].nav[0].id)
}

async function doLogout() {
  try { await fetch('/api/auth/logout', { method: 'POST' }) } catch {}
  accessToken = null
  currentUser = null
  document.getElementById('app').style.display = 'none'
  document.getElementById('login').style.display = 'flex'
}

function setupShell() {
  const role = currentUser.role
  const cfg = ROLES[role]
  const uav = document.getElementById('uav')
  if (currentUser.avatar_url) {
    uav.innerHTML = `<img src="${currentUser.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`
    uav.style.cssText = AV_STYLE[role]
  } else {
    uav.textContent = (currentUser.name || currentUser.email).charAt(0).toUpperCase()
    uav.style.cssText = AV_STYLE[role]
  }
  document.getElementById('uname').textContent = currentUser.name || currentUser.email
  const roleEl = document.getElementById('urole')
  roleEl.textContent = role
  roleEl.style.color = role==='OPERATIONS_SALES'?'#a99de8':role==='PM'?'#4dd9d9':'#f0875a'
  document.getElementById('snav').innerHTML = cfg.nav.map(n => `
    <div class="ni" id="ni-${n.id}" onclick="go('${n.id}')">
      <span class="nic">${n.ic}</span><span>${n.l}</span>
    </div>
  `).join('')
}

function go(id) {
  currentPage = id
  document.querySelectorAll('.ni').forEach(el => {
    const isActive = el.id === 'ni-' + id
    el.classList.toggle('active', isActive)
    if (isActive) flashNavItem(el)
  })
  ;({overview:rOverview, pm:rPM, dev:rDev, projects:rProjects, tasks:rTasks, leads:rLeads, finance:rFinance, workspace:rWorkspace, team:rTeam})[id]?.()
}

function setPage(t, s) {
  document.getElementById('ptitle').textContent = t
  document.getElementById('psub').textContent = s
  setTimeout(triggerPageAnim, 120)
}

function switchTab(el, showId) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t===el))
  let sib = el.closest('.tabs').nextElementSibling
  while(sib){ if(!sib.classList.contains('tabs')) sib.style.display = sib.id===showId?'':'none'; sib=sib.nextElementSibling }
}

function tasksView(tasks, containerId) {

function renderTasksInPlace(tabEl) {
  tabEl.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t===tabEl))
  const area = document.getElementById('tasks-view-area')
  if (!area) return
  // Re-use cached tasks from parent context
  if (window._cachedTasks) area.innerHTML = _taskView==='kanban' ? kanbanHTML(window._cachedTasks) : taskListTabsHTML(window._cachedTasks)
}

function taskListTabsHTML(tasks) {
  const today = new Date(); today.setHours(0,0,0,0)
  const tom = new Date(today); tom.setDate(tom.getDate()+1)
  const twoW = new Date(today); twoW.setDate(twoW.getDate()+14)

  const active = tasks.filter(t=>t.status!=='DONE')
  const done   = tasks.filter(t=>t.status==='DONE')

  const todayT = active.filter(t=>t.deadline && new Date(new Date(t.deadline).setHours(0,0,0,0))<=today.getTime())
  const tomT   = active.filter(t=>{
    if(!t.deadline) return false
    const d=new Date(new Date(t.deadline).setHours(0,0,0,0))
    return d.getTime()===tom.getTime()
  })
  const soonT  = active.filter(t=>{
    if(!t.deadline) return false
    const d=new Date(new Date(t.deadline).setHours(0,0,0,0))
    return d>tom && d<=twoW
  })
  const noDate = active.filter(t=>!t.deadline)

  const tRow = (t,showOv=true) => {
    const ov = showOv && isOverdue(t)
    return `<tr class="${t.status==='DONE'?'done-row':ov?'ov-row':''}">
      <td>${ov?'<span class="od-dot"></span>':''}<span class="cm">${t.title}</span></td>
      <td>${priDot(t.priority)}</td>
      <td>${t.assignee?.email||'—'}</td>
      <td>${taskStatusSel(t)}</td>
      <td style="color:${ov?'var(--red)':'var(--text3)'}">${t.deadline?fmt(t.deadline):'—'}</td>
      <td style="white-space:nowrap;display:flex;gap:6px"><button class="sbtn" onclick="openEditTaskModal('${t.id}')">✎</button><button class="sbtn d" onclick="deleteTask('${t.id}')">✕</button></td>
    </tr>`
  }
  const tbl = (rows) => rows.length===0 ? emptyHTML('Немає задач') : `<table>
    <thead><tr><th>Задача</th><th>Пріоритет</th><th>Виконавець</th><th>Статус</th><th>Дедлайн</th><th></th></tr></thead>
    <tbody>${rows.map(t=>tRow(t)).join('')}</tbody></table>`

  return `
    <div class="tabs">
      <div class="tab active" onclick="switchTab(this,'tl-today')">Сьогодні <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${todayT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-tom')">Завтра <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${tomT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-soon')">2 тижні <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${soonT.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-nd')">Без дати <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${noDate.length}</span></div>
      <div class="tab" onclick="switchTab(this,'tl-done')">Виконані <span style="margin-left:4px;font-family:var(--mono);font-size:9px;opacity:.7">${done.length}</span></div>
    </div>
    <div class="section" id="tl-today">${tbl(todayT)}</div>
    <div class="section" id="tl-tom" style="display:none">${tbl(tomT)}</div>
    <div class="section" id="tl-soon" style="display:none">${tbl(soonT)}</div>
    <div class="section" id="tl-nd" style="display:none">${tbl(noDate)}</div>
    <div class="section" id="tl-done" style="display:none">${tbl(done)}</div>`
}

function kanbanHTML(tasks) {
  const cols = [
    { status:'TODO',        label:'До виконання', color:'var(--text3)' },
    { status:'IN_PROGRESS', label:'В роботі',      color:'var(--violet)' },
    { status:'REVIEW',      label:'На перевірці',  color:'var(--yellow)' },
    { status:'DONE',        label:'Готово',         color:'var(--green)' },
  ]
  return `<div class="kanban">${cols.map(col=>{
    const ct = tasks.filter(t=>t.status===col.status)
    return `<div class="kancol" data-status="${col.status}"
        ondragover="kDragOver(event)"
        ondragleave="kDragLeave(event)"
        ondrop="kDrop(event,'${col.status}')">
      <div class="kancol-h">
        <span class="kancol-title" style="color:${col.color}">${col.label}</span>
        <span class="kancol-cnt" id="kcnt-${col.status}">${ct.length}</span>
      </div>
      <div class="kanboard-cards">
        ${ct.map(t=>{
          const ov=isOverdue(t)
          return `<div class="kancard${col.status==='DONE'?' done-card':''}"
              draggable="true"
              data-task-id="${t.id}"
              data-status="${t.status}"
              ondragstart="kDragStart(event,'${t.id}')"
              ondragend="kDragEnd(event)">
            <div class="kancard-title">${ov?'<span class="od-dot"></span>':''}${t.title}</div>
            <div class="kancard-meta">
              ${priDot(t.priority)}
              ${t.assignee?`<span class="kancard-assignee">· ${t.assignee.email}</span>`:''}
              ${t.deadline?`<span class="kancard-dl" style="color:${ov?'var(--red)':'var(--text3)'}">${fmt(t.deadline)}</span>`:''}
              <button class="sbtn" style="padding:1px 7px;font-size:11px;margin-left:auto" onclick="openEditTaskModal('${t.id}')">✎</button>
              <button class="sbtn d" style="padding:1px 7px;font-size:11px" onclick="deleteTask('${t.id}')">✕</button>
            </div>
            <div style="margin-top:8px">${taskStatusSel(t)}</div>
          </div>`
        }).join('')}
      </div>
    </div>`
  }).join('')}</div>`
}

// ── Kanban drag-and-drop ──
let _dragId = null

function kDragStart(e, taskId) {
  _dragId = taskId
  e.dataTransfer.effectAllowed = 'move'
  setTimeout(() => e.target.classList.add('dragging'), 0)
}

function kDragEnd(e) {
  e.target.classList.remove('dragging')
  document.querySelectorAll('.kancol.drag-over').forEach(c => c.classList.remove('drag-over'))
}

function kDragOver(e) {
  e.preventDefault()
  e.dataTransfer.dropEffect = 'move'
  const col = e.currentTarget
  if (!col.classList.contains('drag-over')) col.classList.add('drag-over')
}

function kDragLeave(e) {
  // Only remove if leaving the column entirely (not entering a child)
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over')
  }
}

async function kDrop(e, newStatus) {
  e.preventDefault()
  const col = e.currentTarget
  col.classList.remove('drag-over')
  if (!_dragId) return

  const taskId = _dragId
  _dragId = null

  const card = document.querySelector(`[data-task-id="${taskId}"]`)
  if (!card) return

  const oldStatus = card.dataset.status
  if (oldStatus === newStatus) return  // no change

  // Optimistic UI: move card immediately
  card.dataset.status = newStatus
  card.classList.toggle('done-card', newStatus === 'DONE')
  const sel = card.querySelector('.status-sel')
  if (sel) sel.value = newStatus

  const targetCards = col.querySelector('.kanboard-cards')
  targetCards.appendChild(card)

  // Update column counters
  document.querySelectorAll('.kancol').forEach(c => {
    const cnt = c.querySelector('.kanboard-cards')?.children.length ?? 0
    const status = c.dataset.status
    const el = document.getElementById('kcnt-' + status)
    if (el) el.textContent = cnt
  })

  // Persist to API
  try {
    const res = await api(`/api/tasks/${taskId}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus }),
    })
    if (!res.ok) {
      // Rollback: move card back
      card.dataset.status = oldStatus
      card.classList.toggle('done-card', oldStatus === 'DONE')
      if (sel) sel.value = oldStatus
      const orig = document.querySelector(`.kancol[data-status="${oldStatus}"] .kanboard-cards`)
      if (orig) orig.appendChild(card)
      const d = await res.json()
      alert(d.error || 'Помилка збереження')
    }
  } catch {
    // silent fail — card stays where user dropped it, will sync on next load
  }
}

// Fetch all tasks across visible projects
async function fetchAllTasks(projects) {
  const results = await Promise.all(
    projects.map(p => api(`/api/projects/${p.id}/tasks`).then(r => r.ok ? r.json() : []).catch(() => []))
  )
  return results.flat()
}

// ════════════════════════════════════════
// TASK STATUS PATCH
// ════════════════════════════════════════
async function patchTaskStatus(taskId, newStatus, selectEl) {
  const oldStatus = selectEl.dataset.prev || [...selectEl.options].find(o => o.defaultSelected)?.value || selectEl.value
  selectEl.dataset.prev = newStatus
  selectEl.disabled = true

  // Optimistic UI: move card to new column immediately
  const card = selectEl.closest('[data-task-id]')
  let origParent = null
  if (card && _taskView === 'kanban') {
    origParent = card.parentElement
    card.dataset.status = newStatus
    card.classList.toggle('done-card', newStatus === 'DONE')
    const targetCards = document.querySelector(`.kancol[data-status="${newStatus}"] .kanboard-cards`)
    if (targetCards) targetCards.appendChild(card)
    // update counters
    document.querySelectorAll('.kancol').forEach(c => {
      const cnt = c.querySelector('.kanboard-cards')?.children.length ?? 0
      const st = c.dataset.status
      const el = document.getElementById('kcnt-' + st)
      if (el) el.textContent = cnt
    })
  }

  try {
    const res = await api(`/api/tasks/${taskId}`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus }),
    })
    if (!res.ok) {
      const e = await res.json()
      alert(e.error || 'Помилка зміни статусу')
      // rollback
      selectEl.value = oldStatus
      selectEl.dataset.prev = oldStatus
      if (card && origParent) {
        card.dataset.status = oldStatus
        card.classList.toggle('done-card', oldStatus === 'DONE')
        origParent.appendChild(card)
      }
    }
  } catch {
    selectEl.value = oldStatus
    selectEl.dataset.prev = oldStatus
    if (card && origParent) {
      card.dataset.status = oldStatus
      card.classList.toggle('done-card', oldStatus === 'DONE')
      origParent.appendChild(card)
    }
  } finally {
    selectEl.disabled = false
  }
}

async function submitProject() {
  const name = document.getElementById('mf-name').value.trim()
  const client = document.getElementById('mf-client').value.trim()
  const type = document.getElementById('mf-type').value
  const deadline = document.getElementById('mf-deadline').value
  if (!name || !client) return modalErr('Назва та клієнт обов\'язкові')
  modalBtnBusy('Створення...')
  try {
    const res = await api('/api/projects', { method:'POST', body: JSON.stringify({ name, client, type, deadline: deadline||null }) })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error || 'Помилка')

async function patchLeadStatus(leadId, newStatus, selectEl) {
  const prev = selectEl.dataset.prev || selectEl.value
  selectEl.dataset.prev = newStatus
  selectEl.disabled = true
  try {
    const res = await api(`/api/leads/${leadId}`, { method:'PATCH', body: JSON.stringify({ status: newStatus }) })

  finally { selectEl.disabled = false }
}

function aiBlock(mode) {
  const isSpec = mode==='spec'
  return `<div class="ai-block">
    <div class="ai-head">
      <div class="ai-ico">✦</div>
      <div>
        <div class="ai-ttl">${isSpec?'AI Генератор ТЗ':'AI Аналітик проєктів'}</div>
        <div class="ai-stl">${isSpec?'Вставте бриф — отримайте структуроване ТЗ':'Запитайте про проєкти, дедлайни, ризики'}</div>
      </div>
      <span class="mock-tag">mock AI</span>
    </div>
    <div class="ai-row">
      <input class="ai-inp" placeholder="${isSpec?'Вставте бриф проєкту...':'Що критично зараз?'}"/>
      ${!isSpec?'<button class="ai-mic">🎤</button>':''}
      <button class="ai-run" onclick="runAI(this,'${mode}')"><span>✦</span> ${isSpec?'Згенерувати':'Аналізувати'}</button>
    </div>
    <div class="ai-res"><pre></pre>
      <div class="ai-acts">
        <button class="ai-act">Копіювати</button>
        <button class="ai-act">Зберегти</button>
        ${isSpec?'<button class="ai-act notion">→ Notion</button>':'<button class="ai-act">Експорт PDF</button>'}
      </div>
    </div>
  </div>`
}

function runAI(btn, mode) {
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Обробка...'
  const res = btn.closest('.ai-block').querySelector('.ai-res')
  res.style.display = 'none'
  setTimeout(() => {
    btn.disabled = false; btn.innerHTML = `<span>✦</span> ${mode==='spec'?'Згенерувати':'Аналізувати'}`
    res.querySelector('pre').textContent = mode==='spec' ? AI_SPEC : AI_ANALYTICS
    res.style.display = 'block'
  }, 1800)
}

function previewAvatar(input) {
  const file = input.files[0]
  if (!file) return
  document.getElementById('mf-avatar-name').textContent = file.name
  const reader = new FileReader()
  reader.onload = e => {
    const prev = document.getElementById('mf-avatar-preview')
    prev.src = e.target.result
    prev.style.display = 'block'
  }
  reader.readAsDataURL(file)
}

async function submitProfile() {
  const name = document.getElementById('mf-name').value.trim()
  const email = document.getElementById('mf-email').value.trim()
  const fileInput = document.getElementById('mf-avatar-file')
  modalBtnBusy('Збереження...')

  let avatar_url
  if (fileInput && fileInput.files[0]) {
    const file = fileInput.files[0]
    if (file.size > 2 * 1024 * 1024) { modalErr('Файл занадто великий (макс 2 МБ)'); modalBtnRestore('Зберегти →'); return }
    avatar_url = await new Promise((resolve, reject) => {
      const r = new FileReader()
      r.onload = e => resolve(e.target.result)
      r.onerror = () => reject(new Error('Помилка читання файлу'))
      r.readAsDataURL(file)
    })
  }

  try {
    const body = { name, email }
    if (avatar_url !== undefined) body.avatar_url = avatar_url
    const res = await api('/api/users?scope=profile', { method:'PATCH', body: JSON.stringify(body) })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error||'Помилка')
    currentUser = { ...currentUser, ...data }
    closeModal()
    setupShell()
  } catch(e) { modalErr(e.message); modalBtnRestore('Зберегти →') }
}

    <select id="mf-role" class="mfield">
      <option value="PM">Проєктний менеджер</option>
      <option value="DEV_WEBFLOW">Webflow розробник</option>
      <option value="DEV_WORDPRESS">WordPress розробник</option>
      <option value="OPERATIONS_SALES">Операції та продажі</option>
    </select>
    <div class="mfooter">
      <button class="sbtn" onclick="closeModal()">Скасувати</button>
      <button class="sbtn p" onclick="submitAddUser()">Створити →</button>
    </div>`)
}

async function submitAddUser() {
  const name  = document.getElementById('mf-name').value.trim()
  const email = document.getElementById('mf-email').value.trim()
  const password = document.getElementById('mf-pass').value
  const role  = document.getElementById('mf-role').value
  if (!email||!password) return modalErr('Email та пароль обов\'язкові')
  modalBtnBusy('Створення...')
  try {
    const res = await api('/api/users?scope=admin', { method:'POST', body: JSON.stringify({ name, email, password, role }) })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error||'Помилка')
    closeModal(); rTeam()
  } catch(e) { modalErr(e.message); modalBtnRestore('Створити →') }
}

function openEditUserModal(id, name, role, isActive) {
  openModal('Редагувати користувача', `
    <div class="merr" id="m-err"></div>
    <label class="mlabel">Ім'я</label>
    <input id="mf-name" class="mfield" value="${name}">
    <label class="mlabel">Роль</label>
    <select id="mf-role" class="mfield">
      <option value="PM"${role==='PM'?' selected':''}>Проєктний менеджер</option>
      <option value="DEV_WEBFLOW"${role==='DEV_WEBFLOW'?' selected':''}>Webflow розробник</option>
      <option value="DEV_WORDPRESS"${role==='DEV_WORDPRESS'?' selected':''}>WordPress розробник</option>
      <option value="OPERATIONS_SALES"${role==='OPERATIONS_SALES'?' selected':''}>Операції та продажі</option>
    </select>
    <label class="mlabel">Статус</label>
    <select id="mf-active" class="mfield">
      <option value="true"${isActive?' selected':''}>Активний</option>
      <option value="false"${!isActive?' selected':''}>Заблокований</option>
    </select>
    <label class="mlabel">Новий пароль (залиш порожнім якщо не міняти)</label>
    <input id="mf-pass" class="mfield" type="password" placeholder="Мін. 8 символів">
    <div class="mfooter">
      <button class="sbtn" onclick="closeModal()">Скасувати</button>
      <button class="sbtn p" onclick="submitEditUser('${id}')">Зберегти →</button>
    </div>`)
}

async function submitEditUser(id) {
  const name = document.getElementById('mf-name').value.trim()
  const role = document.getElementById('mf-role').value
  const is_active = document.getElementById('mf-active').value === 'true'
  const password = document.getElementById('mf-pass').value
  modalBtnBusy('Збереження...')
  try {
    const body = { name, role, is_active, ...(password ? { password } : {}) }
    const res = await api(`/api/users?scope=admin&id=${id}`, { method:'PATCH', body: JSON.stringify(body) })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error||'Помилка')
    closeModal(); rTeam()
  } catch(e) { modalErr(e.message); modalBtnRestore('Зберегти →') }
}

async function deleteUser(id, label) {
  if (!confirm(`Видалити "${label}"? Дія незворотна.`)) return
  try {
    const res = await api(`/api/users?scope=admin&id=${id}`, { method:'DELETE' })
    if (!res.ok) { const e=await res.json(); alert(e.error||'Помилка'); return }
    rTeam()
  } catch(e) { alert(e.message) }
}

// ════════════════════════════════════════
// PRIVATE WORKSPACE (ops_sales only)
// ════════════════════════════════════════
let _privTab = null

async function rWorkspace() {
  setPage('Workspace', 'Приватний простір — тільки для Ops & Sales')
  document.getElementById('pcontent').innerHTML = loadingHTML()
  try {
    const res = await api('/api/tasks/private')
    if (!res.ok) throw new Error('Помилка завантаження')
    const tasks = await res.json()

    // Group by creator
    const byOwner = {}
    tasks.forEach(t => {
      const key = t.creator.id
      if (!byOwner[key]) byOwner[key] = { label: t.creator.name || t.creator.email, tasks: [] }
      byOwner[key].tasks.push(t)
    })

    // Add current user tab if not present
    if (!byOwner[currentUser.id]) {
      byOwner[currentUser.id] = { label: currentUser.name || currentUser.email, tasks: [] }
    }

    const owners = Object.entries(byOwner)
    if (!_privTab) _privTab = owners[0]?.[0]

    document.getElementById('pcontent').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="tabs" style="margin-bottom:0">
          ${owners.map(([id,o])=>`<div class="tab${_privTab===id?' active':''}" onclick="_privTab='${id}';rWorkspace()">${o.label}</div>`).join('')}
        </div>
        <button class="sbtn p" onclick="openPrivTaskModal()">+ Нова задача</button>
      </div>
      ${owners.map(([id,o])=>`
        <div id="pw-${id}" style="${_privTab!==id?'display:none':''}">
          <div class="section">
            <div class="sh"><span class="sh-t">Активні <span style="color:var(--text3);font-weight:400">(${o.tasks.filter(t=>t.status!=='DONE').length})</span></span></div>
            ${privTasksHTML(o.tasks.filter(t=>t.status!=='DONE'))}
          </div>
          ${o.tasks.filter(t=>t.status==='DONE').length > 0 ? `
          <div class="section" style="margin-top:12px">
            <div class="sh"><span class="sh-t" style="color:var(--text3)">Виконані <span style="font-weight:400">(${o.tasks.filter(t=>t.status==='DONE').length})</span></span></div>
            ${privTasksHTML(o.tasks.filter(t=>t.status==='DONE'))}
          </div>`:''}</div>`).join('')}`
  } catch(e) { document.getElementById('pcontent').innerHTML = errorHTML(e.message) }
}

function privTasksHTML(tasks) {
  if (!tasks.length) return `<div class="priv-empty">Порожньо</div>`
  return tasks.map(t=>`
    <div class="ptask-item">
      <div class="ptask-check${t.status==='DONE'?' done':''}" onclick="togglePrivTask('${t.id}','${t.status}')">
        ${t.status==='DONE'?'✓':''}
      </div>
      <div class="ptask-body">
        <div class="ptask-title${t.status==='DONE'?' done':''}">${t.title}</div>
        <div class="ptask-meta">
          <span>${PRI_UA[t.priority]||t.priority}</span>
          ${t.deadline?`<span>· ${fmt(t.deadline)}</span>`:''}
        </div>
      </div>
      <button class="ptask-del" onclick="deletePrivTask('${t.id}')">✕</button>
    </div>`).join('')
}

function openPrivTaskModal() {
  openModal('Нова особиста задача', `
    <div class="merr" id="m-err"></div>
    <label class="mlabel">Назва *</label>
    <input id="mf-title" class="mfield" placeholder="Що треба зробити...">
    <div class="mrow">
      <div class="mhalf">
        <label class="mlabel">Пріоритет</label>
        <select id="mf-priority" class="mfield">
          <option value="LOW">Низький</option>
          <option value="MEDIUM" selected>Середній</option>
          <option value="HIGH">Високий</option>
          <option value="URGENT">Критичний</option>
        </select>
      </div>
      <div class="mhalf">
        <label class="mlabel">Дедлайн</label>
        <input id="mf-deadline" class="mfield" type="date">
      </div>
    </div>
    <div class="mfooter">
      <button class="sbtn" onclick="closeModal()">Скасувати</button>
      <button class="sbtn p" onclick="submitPrivTask()">Додати →</button>
    </div>`)
}

async function submitPrivTask() {
  const title    = document.getElementById('mf-title').value.trim()
  const priority = document.getElementById('mf-priority').value
  const deadline = document.getElementById('mf-deadline').value
  if (!title) return modalErr('Введіть назву задачі')
  modalBtnBusy('Додавання...')
  try {
    const res = await api('/api/tasks/private', { method:'POST', body: JSON.stringify({ title, priority, deadline: deadline||null }) })
    const data = await res.json()
    if (!res.ok) throw new Error(data.error||'Помилка')
    closeModal(); rWorkspace()
  } catch(e) { modalErr(e.message); modalBtnRestore('Додати →') }
}

async function togglePrivTask(id, currentStatus) {
  const newStatus = currentStatus==='DONE' ? 'TODO' : 'DONE'
  try {
    await api(`/api/tasks/private?id=${id}`, { method:'PATCH', body: JSON.stringify({ status: newStatus }) })
    rWorkspace()
  } catch {}
}

async function deletePrivTask(id) {
  try {
    await api(`/api/tasks/private?id=${id}`, { method:'DELETE' })
    rWorkspace()
  } catch {}
}

// ════════════════════════════════════════
// LEADS FILTERS
// ════════════════════════════════════════
let _leadsFilters = { status:'', source:'', minAmt:'' }

function leadsFiltersHTML(leads) {
  const sources = [...new Set(leads.map(l=>l.source))].sort()
  return `<div class="leads-filters">
    <div class="lf-group">
      <div class="lf-label">Статус</div>
      <select class="lf-select" onchange="_leadsFilters.status=this.value;applyLeadsFilter()" >
        <option value="">Всі</option>
        ${['NEW','CONTACTED','PROPOSAL','WON','LOST'].map(s=>`<option value="${s}"${_leadsFilters.status===s?' selected':''}>${STATUS_UA[s]}</option>`).join('')}
      </select>
    </div>
    <div class="lf-group">
      <div class="lf-label">Джерело</div>
      <select class="lf-select" onchange="_leadsFilters.source=this.value;applyLeadsFilter()">
        <option value="">Всі</option>
        ${sources.map(s=>`<option value="${s}"${_leadsFilters.source===s?' selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="lf-group">
      <div class="lf-label">Мін. сума ($)</div>
      <input class="lf-input" type="number" min="0" placeholder="0" value="${_leadsFilters.minAmt}"
        onchange="_leadsFilters.minAmt=this.value;applyLeadsFilter()">
    </div>
    <button class="lf-reset" onclick="_leadsFilters={status:'',source:'',minAmt:''};rLeads()">↺ Скинути</button>
  </div>`
}

function applyLeadsFilter() {
  const all = window._allLeads || []
  const f = _leadsFilters
  const filtered = all.filter(l =>
    (!f.status || l.status===f.status) &&
    (!f.source || l.source===f.source) &&
    (!f.minAmt || l.amount >= Number(f.minAmt))
  )
  const won  = filtered.filter(l=>l.status==='WON').reduce((s,l)=>s+l.amount,0)
  const pipe = filtered.filter(l=>l.status!=='WON'&&l.status!=='LOST').reduce((s,l)=>s+l.amount,0)
  const el = document.getElementById('sc-tot'); if(el) el.textContent = filtered.length
  const ew = document.getElementById('sc-won'); if(ew) ew.textContent = cur(won)
  const ep = document.getElementById('sc-pipe'); if(ep) ep.textContent = cur(pipe)
  const tbl = document.getElementById('leads-table')
  if (tbl) tbl.innerHTML = leadsTableHTML(filtered)
}
